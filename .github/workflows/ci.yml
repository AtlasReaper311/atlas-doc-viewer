name: Pull request CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static document validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Validate HTML
        id: html
        continue-on-error: true
        run: |
          set -o pipefail
          npx --yes html-validate@9.7.1 --formatter=json index.html > html-validate-report.json

      - name: Upload HTML validation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cv-html-validation-report
          path: html-validate-report.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce HTML validation result
        if: ${{ steps.html.outcome != 'success' }}
        run: |
          cat html-validate-report.json
          exit 1

      - name: Validate required PDF contract
        run: |
          python3 - <<'PY'
          from pathlib import Path

          pdf = Path("Atlas_Reaper_System_Architect.pdf")
          if not pdf.is_file() or pdf.stat().st_size == 0:
              raise SystemExit("required CV PDF is missing or empty")
          if not pdf.read_bytes().startswith(b"%PDF-"):
              raise SystemExit("required CV file is not a PDF")
          html = Path("index.html").read_text(encoding="utf-8")
          if pdf.name not in html:
              raise SystemExit("index.html does not link the required CV PDF")
          if '<meta name="robots" content="noindex, follow">' not in html:
              raise SystemExit("CV page must remain noindex, follow")
          PY

      - name: Run interface tests
        run: node --test test/*.test.mjs

      - name: Check browser icon package when synchronized
        run: |
          set -euo pipefail
          expected=(
            favicon.ico
            favicon-16x16.png
            favicon-32x32.png
            apple-touch-icon.png
            android-chrome-192x192.png
            android-chrome-512x512.png
            site.webmanifest
          )
          missing=0
          for path in "${expected[@]}"; do
            if [ ! -s "${path}" ]; then
              echo "missing synchronized browser icon: ${path}"
              missing=1
            fi
          done
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${missing}" -ne 0 ]; then
            exit 1
          fi
          if [ "${missing}" -ne 0 ]; then
            echo "Icon synchronization is completed by the interface preview workflow before final review."
          fi
