name: Synchronize missing browser icons

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/sync-missing-browser-icons.yml"

permissions:
  contents: write

concurrency:
  group: ${{ github.repository }}-sync-missing-browser-icons
  cancel-in-progress: false

jobs:
  synchronize:
    name: Commit canonical browser icons
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/commit-canonical-browser-icons'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: fix/commit-canonical-browser-icons
          fetch-depth: 0
          persist-credentials: true

      - name: Check out canonical browser icons
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-systems
          ref: main
          path: .atlas-icon-source
          sparse-checkout: |
            favicon.ico
            favicon_io
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Copy and validate canonical assets
        run: |
          set -euo pipefail
          cp .atlas-icon-source/favicon.ico favicon.ico
          cp .atlas-icon-source/favicon_io/favicon-16x16.png favicon-16x16.png
          cp .atlas-icon-source/favicon_io/favicon-32x32.png favicon-32x32.png
          cp .atlas-icon-source/favicon_io/apple-touch-icon.png apple-touch-icon.png
          cp .atlas-icon-source/favicon_io/android-chrome-192x192.png android-chrome-192x192.png
          cp .atlas-icon-source/favicon_io/android-chrome-512x512.png android-chrome-512x512.png
          rm -rf .atlas-icon-source

          for path in \
            favicon.ico \
            favicon-16x16.png \
            favicon-32x32.png \
            apple-touch-icon.png \
            android-chrome-192x192.png \
            android-chrome-512x512.png \
            site.webmanifest
          do
            test -s "${path}"
          done

          git diff --check
          test -n "$(git status --porcelain --untracked-files=all -- \
            favicon.ico \
            favicon-16x16.png \
            favicon-32x32.png \
            apple-touch-icon.png \
            android-chrome-192x192.png \
            android-chrome-512x512.png)"

      - name: Commit synchronized assets
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            favicon.ico \
            favicon-16x16.png \
            favicon-32x32.png \
            apple-touch-icon.png \
            android-chrome-192x192.png \
            android-chrome-512x512.png
          git commit -m "fix: commit canonical browser icons"
          git push origin HEAD:fix/commit-canonical-browser-icons
