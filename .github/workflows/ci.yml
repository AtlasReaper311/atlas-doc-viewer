name: Pull request CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static document validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Validate HTML and the required PDF contract
        run: |
          npx --yes html-validate@9.7.1 index.html
          python3 - <<'PY'
          from pathlib import Path

          pdf = Path("Atlas_Reaper_System_Architect.pdf")
          if not pdf.is_file() or pdf.stat().st_size == 0:
              raise SystemExit("required CV PDF is missing or empty")
          if not pdf.read_bytes().startswith(b"%PDF-"):
              raise SystemExit("required CV file is not a PDF")
          html = Path("index.html").read_text(encoding="utf-8")
          if pdf.name not in html:
              raise SystemExit("index.html does not link the required CV PDF")
          if '<meta name="robots" content="noindex, follow">' not in html:
              raise SystemExit("CV page must remain noindex, follow")
          PY

      - name: Run interface tests
        run: node --test test/*.test.mjs

      - name: Check browser icon package when synchronized
        run: |
          set -euo pipefail
          expected=(
            favicon.ico
            favicon-16x16.png
            favicon-32x32.png
            apple-touch-icon.png
            android-chrome-192x192.png
            android-chrome-512x512.png
            site.webmanifest
          )
          missing=0
          for path in "${expected[@]}"; do
            if [ ! -s "${path}" ]; then
              echo "missing synchronized browser icon: ${path}"
              missing=1
            fi
          done
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${missing}" -ne 0 ]; then
            exit 1
          fi
          if [ "${missing}" -ne 0 ]; then
            echo "Icon synchronization is completed by the interface preview workflow before final review."
          fi

      - name: Check repository links offline
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: "--offline --no-progress --include-fragments --root-dir ${{ github.workspace }} ."
          fail: true
