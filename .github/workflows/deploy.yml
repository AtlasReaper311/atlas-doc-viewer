name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.repository }}-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: AtlasReaper311/atlas-infra/.github/workflows/validate-static.yml@main
    with:
      project_name: atlas-doc-viewer
      site_label: cv.atlas-systems.uk
      inject_build_meta: false
    secrets: inherit
